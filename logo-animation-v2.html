<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinerapsodi — Logo Animation v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 12px; left: 16px;
      color: rgba(255,255,255,0.4);
      font: 12px/1.5 monospace;
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }
    #hint {
      position: fixed; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.2);
      font: 11px monospace;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="hud"></div>
<div id="hint">doppio click = esplodi &nbsp;|&nbsp; 1·2·3·4 modalità &nbsp;|&nbsp; SPACE pausa &nbsp;|&nbsp; R reset &nbsp;|&nbsp; B glow &nbsp;|&nbsp; rotella = zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script>
'use strict';

// ╔══════════════════════════════════════════════════════════════╗
// ║  URL del logo su GitHub Pages (già pubblicato)              ║
const LOGO_URL = 'logo.png';
// ╚══════════════════════════════════════════════════════════════╝

const CFG = {
  sampling        : 3,
  repulsionR      : 90,
  repulsionStr    : 5.5,
  noiseScale      : 0.003,
  noiseTimeScale  : 0.4,
  explosionForce  : 10.0,
  focalLength     : 900,
  glowAlpha       : 120,

  // ── V2: convergenza accelerata ──────────────────────────────
  attractSpeed    : 0.14,   // era 0.06 — più alto = converge più in fretta
  dampingMode1    : 0.82,   // era 0.88 — più basso = si ferma prima

  // ── V2: doppio click esplosione ─────────────────────────────
  dblClickForce   : 22,     // forza esplosione al doppio click
  resetDelay      : 1400,   // ms dopo esplosione prima del reset
};

// ── Stato globale ───────────────────────────────────────────────
let particles  = [];
let pgMain, pgBlur;
let logoImg;
let t          = 0;
let mousePos;
let sizeScale  = 1.0;
let mode       = 1;
let paused     = false;
let glowOn     = true;
let closestIdx = -1;

// Modalità 2
let exploding = false, attracting = false;

// Modalità 4
let rotY = 0, rotX = 0, autoSpin = false, spinV = 0;

// ── V2: stato esplosione doppio click ───────────────────────────
let dblClickExploding = false;   // fase esplosione attiva
let dblClickOrigin;              // punto di esplosione
let resetTimer = null;           // timer per il reset dopo esplosione

// ── Classe Particella ───────────────────────────────────────────
class Particle {
  constructor(tx, ty, sz) {
    this.target = createVector(tx, ty);
    this.size   = sz;
    this.phase  = random(TWO_PI);
    this.ox     = tx - width  * 0.5;
    this.oy     = ty - height * 0.5;
    this.oz     = random(-250, 250);
    this.sx = tx; this.sy = ty; this.ss = sz;
    this.reset();
  }

  // Posizione iniziale: casuale sullo schermo
  reset() {
    this.pos   = createVector(random(width), random(height));
    this.vel   = createVector(0, 0);
    this.acc   = createVector(0, 0);
    this.alpha = random(40, 120);
  }

  update() {
    this.vel.add(this.acc);
    this.vel.limit(12);
    this.pos.add(this.vel);
    this.acc.set(0, 0);
  }

  repel(mp) {
    let d = p5.Vector.dist(this.pos, mp);
    if (d < CFG.repulsionR && d > 0) {
      let f = p5.Vector.sub(this.pos, mp);
      f.normalize().mult((CFG.repulsionR - d) * CFG.repulsionStr * 0.01);
      this.vel.add(f);
    }
  }

  vortex(mp) {
    let d = p5.Vector.dist(this.pos, mp);
    if (d < 180 && d > 0) {
      let a = atan2(this.pos.y - mp.y, this.pos.x - mp.x) + HALF_PI;
      let v = p5.Vector.fromAngle(a);
      v.mult(map(d, 0, 180, 2.5, 0) * 0.3);
      this.acc.add(v);
    }
  }

  wrap() {
    const m = 50;
    if (this.pos.x < -m)         this.pos.x = width  + m;
    if (this.pos.x > width  + m) this.pos.x = -m;
    if (this.pos.y < -m)         this.pos.y = height + m;
    if (this.pos.y > height + m) this.pos.y = -m;
  }

  project(rY, rX) {
    let cosY = cos(rY), sinY = sin(rY);
    let rx   = this.ox * cosY - this.oz * sinY;
    let rz   = this.ox * sinY + this.oz * cosY;
    let cosX = cos(rX), sinX = sin(rX);
    let ry2  = this.oy * cosX - rz  * sinX;
    let rzz  = this.oy * sinX + rz  * cosX;
    let sc   = CFG.focalLength / (CFG.focalLength + rzz);
    this.sx  = width  * 0.5 + rx  * sc;
    this.sy  = height * 0.5 + ry2 * sc;
    this.ss  = this.size * sc * sizeScale;
    this.alpha = map(rzz, -250, 250, 80, 255);
  }

  draw(g, is3D) {
    let s  = is3D ? this.ss       : this.size * sizeScale;
    let px = is3D ? this.sx       : this.pos.x;
    let py = is3D ? this.sy       : this.pos.y;
    g.noStroke();
    g.fill(255, 255, 255, this.alpha);
    g.rectMode(CENTER);
    g.rect(px, py, max(s, 0.5), max(s, 0.5), 1.5);
  }

  distToTarget() { return p5.Vector.dist(this.pos, this.target); }
}

// ── Build particelle ────────────────────────────────────────────
function buildParticles() {
  particles = [];
  if (!logoImg) return;

  let lh = height * 0.70;
  let sc = lh / logoImg.height;
  let lw = logoImg.width * sc;
  let ox = (width  - lw) * 0.5;
  let oy = (height - lh) * 0.5;

  logoImg.loadPixels();

  for (let py = 0; py < logoImg.height; py += CFG.sampling) {
    for (let px = 0; px < logoImg.width;  px += CFG.sampling) {
      let idx = (py * logoImg.width + px) * 4;
      let r   = logoImg.pixels[idx];
      let g2  = logoImg.pixels[idx + 1];
      let b   = logoImg.pixels[idx + 2];
      let a   = logoImg.pixels[idx + 3];
      let br  = (r + g2 + b) / 3.0;

      let active = (br > 50) || (a > 128 && br > 30);
      if (!active) continue;

      let tx = ox + px * sc;
      let ty = oy + py * sc;
      let sz = map(br > 50 ? br : 200, 50, 255, 1.0, 7.0);
      particles.push(new Particle(tx, ty, sz));
    }
  }
  console.log('Particelle v2:', particles.length);
}

// ── V2: Esplosione doppio click ─────────────────────────────────
function triggerDoubleClickExplosion(cx, cy) {
  // Annulla reset eventuale in corso
  if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }

  dblClickExploding = true;
  dblClickOrigin    = createVector(cx, cy);

  // Applica impulso esplosivo a tutte le particelle
  for (let p of particles) {
    let dir = p5.Vector.sub(p.pos, dblClickOrigin);
    let d   = dir.mag();
    // Le particelle vicine ricevono più forza
    let str = map(d, 0, max(width, height) * 0.5, CFG.dblClickForce, CFG.dblClickForce * 0.3);
    if (d < 1) dir = p5.Vector.random2D();
    dir.normalize().mult(str * random(0.7, 1.3));
    p.vel.add(dir);
    // Alpha bassa per effetto di dissoluzione
    p.alpha = random(180, 255);
  }

  // Dopo resetDelay ms: riporta le particelle alla posizione iniziale (random → logo)
  resetTimer = setTimeout(() => {
    for (let p of particles) {
      p.reset();
    }
    dblClickExploding = false;
    resetTimer        = null;
  }, CFG.resetDelay);
}

// ── Rotazione 3D ───────────────────────────────────────────────
function updateRotation3D() {
  if (autoSpin) {
    rotY  += spinV;
    spinV *= 0.995;
    if (abs(spinV) < 0.0001) autoSpin = false;
  } else {
    rotY = lerp(rotY, map(mouseX, 0, width,  -PI / 4, PI / 4), 0.05);
    rotX = lerp(rotX, map(mouseY, 0, height, -PI / 6, PI / 6), 0.05);
  }
}

// ── Fisica per modalità ─────────────────────────────────────────
function tickParticle(p) {
  // Se esplosione doppio click attiva: solo inerzia + attrito
  if (dblClickExploding) {
    p.vel.mult(0.92);
    p.update();
    p.alpha = constrain(p.alpha - 1.5, 30, 255);
    return;
  }

  switch (mode) {

    // MODALITÀ 1 — Breathing + convergenza veloce
    case 1: {
      let bx = p.target.x + sin(t * 1.2 + p.phase) * 2.5;
      let by = p.target.y + cos(t * 0.9 + p.phase) * 2.5;
      // Attrazione più forte rispetto alla v1
      p.acc.add(createVector(bx - p.pos.x, by - p.pos.y).mult(CFG.attractSpeed));
      p.repel(mousePos);
      p.vel.mult(CFG.dampingMode1);
      // Alpha: sale rapidamente quando si avvicina al target
      let dt    = p.distToTarget();
      let close = map(constrain(dt, 0, 80), 0, 80, 255, 150);
      p.alpha   = lerp(p.alpha, close, 0.08);
      p.update();
      break;
    }

    // MODALITÀ 2 — Esplosione / Ricomposizione
    case 2: {
      if (exploding) {
        let ex = p5.Vector.sub(p.pos, mousePos);
        let d  = ex.mag();
        if (d < 300 && d > 0) {
          ex.normalize().mult(map(d, 0, 300, CFG.explosionForce * 1.2, 0.5));
          p.vel.add(ex);
        }
        p.vel.mult(random(0.95, 0.99));
        p.alpha = constrain(map(p.distToTarget(), 0, 400, 255, 60), 60, 255);
      } else if (attracting) {
        p.acc.add(p5.Vector.sub(mousePos, p.pos).mult(0.05));
        p.vel.mult(0.88);
        p.alpha = 200;
      } else {
        let h = p5.Vector.sub(p.target, p.pos);
        // Anche in modalità 2 la ricomposizione è più veloce
        h.mult(0.06 + p.size * 0.002);
        p.acc.add(h);
        p.vel.mult(0.86);
        let dt  = p.distToTarget();
        p.alpha = constrain(dt < 5 ? 255 : map(dt, 5, 500, 255, 40), 40, 255);
      }
      p.update();
      break;
    }

    // MODALITÀ 3 — Flusso Perlin
    case 3: {
      let angle = noise(
        p.pos.x * CFG.noiseScale,
        p.pos.y * CFG.noiseScale,
        t       * CFG.noiseTimeScale
      ) * TWO_PI * 2.5;

      p.acc.add(p5.Vector.fromAngle(angle).mult(0.6));
      p.vel.limit(3.5);
      p.vel.mult(0.98);

      let dt = p5.Vector.dist(p.pos, p.target);
      if (dt < 35) {
        p.acc.add(p5.Vector.sub(p.target, p.pos).mult(0.08));
        p.vel.mult(0.85);
      }

      p.wrap();
      p.vortex(mousePos);
      p.alpha = constrain(map(dt, 0, 200, 220, 120), 100, 230);
      p.update();
      break;
    }

    // MODALITÀ 4 — Rotazione 3D
    case 4: {
      p.project(rotY, rotX);
      break;
    }
  }
}

// ── p5.js preload ───────────────────────────────────────────────
function preload() {
  logoImg = loadImage(LOGO_URL,
    () => console.log('Logo caricato.'),
    () => { console.warn('Logo non trovato — fallback.'); logoImg = makeFallback(); }
  );
}

// ── p5.js setup ────────────────────────────────────────────────
function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  frameRate(60);

  pgMain = createGraphics(width, height);
  pgBlur = createGraphics(width, height);
  pgMain.pixelDensity(1);
  pgBlur.pixelDensity(1);

  mousePos      = createVector(width * 0.5, height * 0.5);
  dblClickOrigin = createVector(width * 0.5, height * 0.5);

  buildParticles();
}

// ── p5.js draw ─────────────────────────────────────────────────
function draw() {
  if (!paused) t += 1.0 / 60.0;

  let is3D = (mode === 4);
  if (mode === 4 && !paused) updateRotation3D();

  // Aggiorna + trova particella più vicina al mouse
  closestIdx = -1;
  let cDist  = 1e9;
  if (!paused) {
    for (let i = 0; i < particles.length; i++) {
      tickParticle(particles[i]);
      let p  = particles[i];
      let px = is3D ? p.sx : p.pos.x;
      let py = is3D ? p.sy : p.pos.y;
      let d  = dist(px, py, mouseX, mouseY);
      if (d < cDist) { cDist = d; closestIdx = i; }
    }
  }

  // Render su pgMain
  pgMain.clear();
  pgMain.rectMode(CENTER);
  for (let i = 0; i < particles.length; i++) {
    let p = particles[i];
    if (i === closestIdx && !dblClickExploding) {
      let px = is3D ? p.sx  : p.pos.x;
      let py = is3D ? p.sy  : p.pos.y;
      let ps = (is3D ? p.ss : p.size * sizeScale) * 3;
      pgMain.noStroke();
      pgMain.fill(255, 40);
      pgMain.rect(px, py, ps * 2, ps * 2, 3);
      pgMain.fill(255, 255);
      pgMain.rect(px, py, ps, ps, 1.5);
    } else {
      p.draw(pgMain, is3D);
    }
  }

  // Compositing
  background(0);
  if (glowOn) {
    pgBlur.clear();
    pgBlur.image(pgMain, 0, 0);
    pgBlur.filter(BLUR, 8);
    blendMode(ADD);
    tint(255, CFG.glowAlpha);
    image(pgBlur, 0, 0);
    tint(255, 255);
  }
  blendMode(BLEND);
  image(pgMain, 0, 0);

  // HUD
  let stato = dblClickExploding ? ' | 💥 ESPLOSIONE' : '';
  document.getElementById('hud').textContent =
    `v2 · Modalità ${mode}  |  ${nf(frameRate(), 0, 0)} fps  |  ${particles.length} particelle  |  Glow ${glowOn ? 'ON' : 'OFF'}${paused ? '  |  [PAUSA]' : ''}${stato}`;
}

// ── Input mouse ────────────────────────────────────────────────
function mouseMoved()   { mousePos.set(mouseX, mouseY); }
function mouseDragged() { mousePos.set(mouseX, mouseY); }

function mousePressed() {
  mousePos.set(mouseX, mouseY);
  if (mode === 2) {
    if (mouseButton === LEFT)  exploding = true;
    if (mouseButton === RIGHT) { exploding = false; attracting = false; }
  }
  if (mode === 4 && mouseButton === LEFT) { autoSpin = true; spinV = 0.025; }
  return false;
}

function mouseReleased() {
  if (mode === 2 && mouseButton === LEFT) exploding = false;
}

// ── V2: doppio click ────────────────────────────────────────────
function doubleClicked() {
  triggerDoubleClickExplosion(mouseX, mouseY);
  return false;
}

function mouseWheel(event) {
  sizeScale = constrain(sizeScale - event.delta * 0.001, 0.3, 3.0);
  return false;
}

// ── Input tastiera ─────────────────────────────────────────────
function keyPressed() {
  if (keyCode === SHIFT && mode === 2) { attracting = true; exploding = false; }

  switch (key) {
    case '1': setMode(1); break;
    case '2': setMode(2); break;
    case '3': setMode(3); break;
    case '4': setMode(4); break;
    case ' ': paused = !paused; break;
    case 'r': case 'R':
      // Reset manuale: posizioni random → riconvergono
      if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
      dblClickExploding = false;
      for (let p of particles) p.reset();
      break;
    case 'b': case 'B': glowOn = !glowOn; break;
    case '+': case '=': CFG.sampling = max(1, CFG.sampling - 1); buildParticles(); break;
    case '-': case '_': CFG.sampling = min(10, CFG.sampling + 1); buildParticles(); break;
    case 'f': case 'F': fullscreen(!fullscreen()); break;
  }
  if (key === ' ') return false;
}

function keyReleased() {
  if (keyCode === SHIFT) attracting = false;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  pgMain.remove(); pgBlur.remove();
  pgMain = createGraphics(width, height);
  pgBlur = createGraphics(width, height);
  pgMain.pixelDensity(1);
  pgBlur.pixelDensity(1);
  buildParticles();
}

function setMode(m) {
  mode       = m;
  exploding  = false;
  attracting = false;
}

function makeFallback() {
  let pg = createGraphics(800, 300);
  pg.background(0);
  pg.fill(255);
  pg.noStroke();
  pg.textSize(150);
  pg.textAlign(CENTER, CENTER);
  pg.text('LOGO', 400, 155);
  return pg;
}
</script>
</body>
</html>
